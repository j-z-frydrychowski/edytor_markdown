<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edytor Markdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app" class="container mt-4">
        <h1 class="mb-4">Kolaboracyjny Edytor Markdown</h1>
        
        <div id="auth-section" class="row">
            <div class="col-md-6">
                <h2>Logowanie</h2>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Zaloguj</button>
                </form>
            </div>
            <div class="col-md-6">
                <h2>Rejestracja</h2>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" id="register-username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" id="register-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Zarejestruj</button>
                </form>
            </div>
        </div>
        <div id="message-container" class="mt-3"></div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>
