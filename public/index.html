<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edytor Markdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-light">
    <div id="app" class="container mt-4">
        <h1 class="mb-4">Kolaboracyjny Edytor Markdown</h1>
        
        <div id="auth-section" class="row">
            <div class="col-md-6">
                <h2>Logowanie</h2>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Zaloguj</button>
                </form>
            </div>
            <div class="col-md-6">
                <h2>Rejestracja</h2>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" id="register-username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" id="register-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Zarejestruj</button>
                </form>
            </div>
        </div>

        <div id="dashboard-section" class="d-none mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Twoje dokumenty</h2>
                <button id="logout-btn" class="btn btn-outline-danger">Wyloguj</button>
            </div>
            <button id="create-doc-btn" class="btn btn-primary mb-3">Nowy dokument</button>
            <ul id="documents-list" class="list-group"></ul>
        </div>
        <div id="editor-section" class="d-none mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="current-doc-title">Tytuł dokumentu</h2>
                <button id="back-btn" class="btn btn-secondary">Wróć do listy</button>
            <div id="connection-status" class="mb-3 text-success fw-bold">Status: Online</div>
            <div id="active-users-container" class="mb-3 text-muted small border rounded p-2 bg-light">Brak innych użytkowników w dokumencie.</div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <textarea id="markdown-input" class="form-control" style="height: 70vh;" placeholder="Wpisz kod Markdown..."></textarea>
                </div>
                <div class="col-md-6">
                    <div id="html-preview" class="border p-3 bg-white" style="height: 70vh; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
        <div id="message-container" class="mt-3"></div>
    </div>

    <script src="js/main.js" type="module"></script>
</body>
</html>
